<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天吃什么</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #ff6b6b;
      --primary-dark: #ee5a24;
      --secondary: #ffa502;
      --accent: #ff6348;
      --bg-start: #667eea;
      --bg-end: #764ba2;
      --surface: rgba(255,255,255,0.92);
      --surface-light: rgba(255,255,255,0.65);
      --text: #2d3436;
      --text-light: #636e72;
      --border: rgba(255,255,255,0.4);
      --shadow: 0 8px 32px rgba(31,38,135,0.15);
      --shadow-lg: 0 20px 60px rgba(31,38,135,0.25);
      --radius-sm: 12px;
      --radius: 16px;
      --radius-lg: 24px;
      --radius-xl: 28px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(255,107,107,0.35) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255,165,2,0.35) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(118,75,162,0.25) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-decoration {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-decoration__item {
      position: absolute;
      font-size: 28px;
      opacity: 0.12;
      animation: float-bg linear infinite;
      filter: blur(0.5px);
    }

    @keyframes float-bg {
      0% {
        transform: translateY(110vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.12; }
      90% { opacity: 0.12; }
      100% {
        transform: translateY(-120px) rotate(360deg);
        opacity: 0;
      }
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 24px 16px 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .main-card {
      width: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(255,255,255,0.88));
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: var(--shadow-lg);
      padding: 28px 24px;
      animation: card-enter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes card-enter {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .header {
      text-align: center;
      padding: 0 0 20px;
      animation: fade-in-up 0.5s ease 0.1s both;
    }

    .header__title {
      font-size: 34px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    .header__subtitle {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 6px;
      font-weight: 400;
    }

    .scene-bar {
      display: flex;
      gap: 8px;
      padding: 0 0 12px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fade-in-up 0.5s ease 0.15s both;
    }

    .scene-bar__btn {
      padding: 8px 16px;
      border: 1.5px solid rgba(102,126,234,0.15);
      border-radius: 24px;
      background: rgba(102,126,234,0.06);
      color: var(--text-light);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .scene-bar__btn:hover {
      background: rgba(102,126,234,0.12);
      border-color: rgba(102,126,234,0.25);
      transform: translateY(-2px);
    }

    .scene-bar__btn--active {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 14px rgba(255,107,107,0.35);
    }

    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 0 0 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fade-in-up 0.5s ease 0.2s both;
    }

    .filter-bar__chip {
      padding: 6px 12px;
      border: 1.5px solid rgba(118,75,162,0.12);
      border-radius: 20px;
      background: rgba(118,75,162,0.05);
      color: var(--text-light);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
    }

    .filter-bar__chip:hover {
      background: rgba(118,75,162,0.1);
      border-color: rgba(118,75,162,0.2);
      transform: translateY(-1px);
    }

    .filter-bar__chip--active {
      background: rgba(255,165,2,0.9);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 2px 10px rgba(255,165,2,0.3);
    }

    .wheel-section {
      position: relative;
      margin: 8px 0 24px;
      display: flex;
      justify-content: center;
      animation: fade-in-up 0.5s ease 0.25s both;
    }

    .wheel-glow {
      position: absolute;
      inset: -24px;
      background: radial-gradient(circle, rgba(255,107,107,0.35) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 0.85; transform: scale(1.08); }
    }

    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      transition: transform 0.15s ease;
    }

    .wheel-container--spinning {
      transform: scale(0.98);
    }

    .wheel-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.2),
        0 0 30px rgba(255,107,107,0.2);
      pointer-events: none;
    }

    .wheel-container__pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 36px;
      z-index: 10;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
    }

    .wheel-container__pointer::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .wheel-container__pointer::after {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-top: 28px solid #fff;
    }

    .wheel-container__canvas {
      display: block;
      border-radius: 50%;
      box-shadow:
        0 0 0 8px rgba(255,255,255,0.35),
        0 0 0 14px rgba(255,255,255,0.15),
        0 20px 60px rgba(0,0,0,0.25);
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      animation: fade-in-up 0.5s ease 0.3s both;
    }

    .actions__btn {
      padding: 14px 32px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .actions__btn--spin {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      box-shadow: 0 6px 22px rgba(255,107,107,0.45);
    }

    .actions__btn--spin::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
      transition: left 0.5s ease;
    }

    .actions__btn--spin:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,107,0.55);
    }

    .actions__btn--spin:hover::before {
      left: 100%;
    }

    .actions__btn--spin:active {
      transform: translateY(0);
    }

    .actions__btn--spin:disabled {
      opacity: 0.75;
      cursor: not-allowed;
      transform: none;
    }

    .actions__btn--secondary {
      background: rgba(102,126,234,0.1);
      color: var(--bg-start);
      border: 1.5px solid rgba(102,126,234,0.2);
    }

    .actions__btn--secondary:hover {
      background: rgba(102,126,234,0.18);
      border-color: rgba(102,126,234,0.3);
      transform: translateY(-2px);
    }

    .result {
      text-align: center;
      padding: 20px 0 0;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fade-in-up 0.5s ease 0.35s both;
    }

    .result__card {
      background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.75));
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: var(--radius-lg);
      padding: 20px 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      opacity: 0;
      transform: scale(0.85) translateY(15px);
      transition: all 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .result__card--visible {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .result__emoji {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 8px;
      animation: emoji-bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes emoji-bounce {
      0% { transform: scale(0) rotate(-20deg); }
      60% { transform: scale(1.2) rotate(10deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .result__text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .result__actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease 0.15s;
    }

    .result__actions--visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toolbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.25);
      z-index: 50;
    }

    .toolbar__btn {
      padding: 10px 20px;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 14px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .toolbar__btn:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 16px;
    }

    .modal-overlay--visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.92));
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      width: min(90vw, 460px);
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      transform: scale(0.92) translateY(30px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(255,255,255,0.6);
    }

    .modal-overlay--visible .modal {
      transform: scale(1) translateY(0);
    }

    .modal__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .modal__title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal__close {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(0,0,0,0.05);
      font-size: 22px;
      cursor: pointer;
      color: var(--text-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal__close:hover {
      background: rgba(0,0,0,0.1);
      transform: rotate(90deg);
    }

    .modal__body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .add-form__input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid rgba(0,0,0,0.08);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.8);
    }

    .add-form__input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(255,107,107,0.1);
    }

    .add-form__btn {
      padding: 12px 22px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s ease;
    }

    .add-form__btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,107,107,0.35);
    }

    .dish-list {
      list-style: none;
    }

    .dish-list__item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      background: rgba(102,126,234,0.05);
      transition: all 0.2s ease;
      gap: 12px;
    }

    .dish-list__item:hover {
      background: rgba(102,126,234,0.1);
      transform: translateX(4px);
    }

    .dish-list__item--blacklisted {
      opacity: 0.55;
      background: rgba(255,99,72,0.06);
    }

    .dish-list__info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
      flex: 1;
    }

    .dish-list__name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .dish-list__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .dish-list__tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .dish-list__tag {
      font-size: 11px;
      padding: 3px 8px;
      background: linear-gradient(135deg, rgba(102,126,234,0.12), rgba(118,75,162,0.12));
      border-radius: 6px;
      color: var(--bg-start);
      font-weight: 500;
    }

    .dish-list__scenes {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(255,165,2,0.12);
      border-radius: 6px;
      color: #d68910;
      font-weight: 500;
    }

    .dish-list__weight {
      font-size: 11px;
      color: var(--text-light);
      padding: 3px 8px;
      background: rgba(0,0,0,0.04);
      border-radius: 6px;
      white-space: nowrap;
    }

    .dish-list__actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .dish-list__blacklist,
    .dish-list__delete {
      width: 34px;
      height: 34px;
      border: none;
      background: rgba(0,0,0,0.04);
      cursor: pointer;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 16px;
      color: var(--text-light);
    }

    .dish-list__blacklist:hover {
      background: rgba(255,165,0,0.15);
      color: #e67e22;
    }

    .dish-list__blacklist--active {
      background: rgba(255,165,0,0.15);
      color: #e67e22;
    }

    .dish-list__delete {
      color: var(--accent);
    }

    .dish-list__delete:hover {
      background: rgba(255,99,72,0.12);
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-light);
    }

    .empty-state__icon {
      font-size: 56px;
      margin-bottom: 12px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .empty-state__text {
      font-size: 15px;
      font-weight: 500;
    }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      color: #fff;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .toast--visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 150;
    }

    .confetti__piece {
      position: absolute;
      width: 10px;
      height: 10px;
      opacity: 0;
    }

    @keyframes confetti-fall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg) scale(0.5);
      }
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 16px 12px 90px;
      }
      .main-card {
        padding: 22px 18px;
        border-radius: 22px;
      }
      .header {
        padding: 0 0 16px;
      }
      .header__title {
        font-size: 28px;
      }
      .header__subtitle {
        font-size: 13px;
      }
      .scene-bar {
        gap: 6px;
        padding: 0 0 10px;
      }
      .scene-bar__btn {
        padding: 6px 14px;
        font-size: 12px;
      }
      .filter-bar {
        gap: 6px;
        padding: 0 0 12px;
      }
      .filter-bar__chip {
        padding: 5px 10px;
        font-size: 11px;
      }
      .wheel-section {
        margin: 4px 0 20px;
      }
      .wheel-container {
        width: 260px;
        height: 260px;
      }
      .wheel-ring {
        inset: -8px;
      }
      .actions__btn {
        padding: 12px 26px;
        font-size: 15px;
      }
      .result__card {
        padding: 16px 22px;
      }
      .result__emoji {
        font-size: 40px;
      }
      .result__text {
        font-size: 20px;
      }
      .modal {
        width: 95vw;
        max-height: 88vh;
        border-radius: 22px;
      }
      .modal__body {
        padding: 16px 18px;
      }
      .toolbar {
        gap: 8px;
        padding: 10px 12px;
      }
      .toolbar__btn {
        padding: 8px 14px;
        font-size: 12px;
      }
    }

    @media (max-width: 360px) {
      .header__title {
        font-size: 24px;
      }
      .wheel-container {
        width: 220px;
        height: 220px;
      }
      .actions__btn {
        padding: 10px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-decoration" id="bgDecoration"></div>

  <div class="app">
    <div class="main-card">
      <header class="header">
        <h1 class="header__title">今天吃什么</h1>
        <p class="header__subtitle">转一转，帮你做决定！</p>
      </header>

      <nav class="scene-bar" id="sceneBar"></nav>

      <div class="filter-bar" id="filterBar"></div>

      <div class="wheel-section">
        <div class="wheel-glow"></div>
        <div class="wheel-container" id="wheelContainer">
          <div class="wheel-ring"></div>
          <div class="wheel-container__pointer"></div>
          <canvas class="wheel-container__canvas" id="wheelCanvas" width="300" height="300"></canvas>
        </div>

      <div class="actions">
        <button class="actions__btn actions__btn--spin" id="spinBtn">🎯 今天吃什么</button>
      </div>

        </div>

    <div class="modal">

      </div>

        </div>
        <ul class="dish-list" id="dishList"></ul>
      </div>
    </div>
  </div>

<script>
const SCENES = ['不限', '早餐', '午餐', '晚餐', '夜宵'];
const FILTERS = [
  { key: 'excludeSpicy', label: '🌶️ 不吃辣' },
  { key: 'excludeNoodles', label: '🍜 不吃面' },
  { key: 'excludeRecent', label: '🕒 避开最近吃过的' },
  { key: 'excludeBlacklisted', label: '💣 避开踩雷' },
];
const WHEEL_SIZE = 300;
const WHEEL_CENTER = WHEEL_SIZE / 2;
const WHEEL_RADIUS = WHEEL_CENTER - 12;
const SPIN_DURATION = 4500;
const MIN_ROTATIONS = 5;

const FOOD_EMOJIS = ['🍜', '🍕', '🍱', '🍔', '🥟', '🍛', '🍝', '🥘', '🍲', '🍗', '🥗', '🍳', '🌮', '🍣', '🍤'];

const BG_EMOJIS = ['🍜', '🍕', '🍱', '🍔', '🥟', '🍛', '🍝', '🥘', '🍲', '🍗', '🥗', '🍳', '🌮', '🍣', '🍤', '🥢', '🍽️', '🥄'];

const WHEEL_COLORS = [
  '#ff6b6b', '#ffa502', '#ff7f50', '#ffbe76',
  '#f8b739', '#7bed9f', '#70a1ff', '#5352ed',
  '#ff6348', '#eccc68', '#a4b0be', '#ff9ff3',
];

const PRESET_DISHES = [
  { name: '宫保鸡丁', tags: ['米饭类', '家常菜'], scenes: ['午餐', '晚餐'] },
  { name: '鱼香肉丝', tags: ['米饭类', '家常菜'], scenes: ['午餐', '晚餐'] },
  { name: '番茄炒蛋', tags: ['米饭类', '家常菜'], scenes: ['午餐', '晚餐'] },
  { name: '红烧肉', tags: ['米饭类', '家常菜'], scenes: ['午餐', '晚餐'] },
  { name: '麻婆豆腐', tags: ['米饭类', '川菜'], scenes: ['午餐', '晚餐'] },
  { name: '回锅肉', tags: ['米饭类', '川菜'], scenes: ['午餐', '晚餐'] },
  { name: '糖醋里脊', tags: ['米饭类', '家常菜'], scenes: ['午餐', '晚餐'] },
  { name: '炸酱面', tags: ['面条类', '主食'], scenes: ['午餐', '晚餐'] },
  { name: '牛肉面', tags: ['面条类', '主食'], scenes: ['午餐', '晚餐'] },
  { name: '担担面', tags: ['面条类', '川菜'], scenes: ['午餐', '晚餐'] },
  { name: '阳春面', tags: ['面条类', '主食'], scenes: ['早餐', '午餐'] },
  { name: '刀削面', tags: ['面条类', '主食'], scenes: ['午餐', '晚餐'] },
  { name: '麻辣火锅', tags: ['火锅类', '聚餐'], scenes: ['晚餐', '夜宵'] },
  { name: '清汤火锅', tags: ['火锅类', '聚餐'], scenes: ['晚餐', '夜宵'] },
  { name: '串串香', tags: ['火锅类', '小吃'], scenes: ['晚餐', '夜宵'] },
  { name: '煎饼果子', tags: ['小吃类', '快餐'], scenes: ['早餐', '午餐'] },
  { name: '肉夹馍', tags: ['小吃类', '快餐'], scenes: ['早餐', '午餐'] },
  { name: '烤冷面', tags: ['小吃类', '快餐'], scenes: ['午餐', '夜宵'] },
  { name: '煎饺', tags: ['小吃类', '快餐'], scenes: ['早餐', '午餐'] },
  { name: '手抓饼', tags: ['小吃类', '快餐'], scenes: ['早餐', '午餐'] },
  { name: '披萨', tags: ['西餐类', '快餐'], scenes: ['午餐', '晚餐'] },
  { name: '汉堡', tags: ['西餐类', '快餐'], scenes: ['午餐', '晚餐'] },
  { name: '意面', tags: ['西餐类', '主食'], scenes: ['午餐', '晚餐'] },
  { name: '豆浆油条', tags: ['小吃类', '早餐'], scenes: ['早餐'] },
  { name: '小笼包', tags: ['小吃类', '早餐'], scenes: ['早餐'] },
  { name: '豆腐脑', tags: ['小吃类', '早餐'], scenes: ['早餐'] },
];

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function loadData() {
  try {
    const raw = localStorage.getItem('whatToEat');
    if (raw) return JSON.parse(raw);
  } catch (e) {
    console.warn('读取本地数据失败:', e);
  }
  return null;
}

function saveData(data) {
  try {
    localStorage.setItem('whatToEat', JSON.stringify(data));
  } catch (e) {
    console.warn('保存本地数据失败:', e);
  }
}

function filterDishes(dishes, scene, filters) {
  return dishes.filter(dish => {
    if (scene !== '不限' && !dish.scenes.includes(scene)) return false;
    if (filters.excludeBlacklisted && dish.isBlacklisted) return false;
    if (filters.excludeRecent && dish.lastEaten) {
      const daysSince = (Date.now() - dish.lastEaten) / (1000 * 60 * 60 * 24);
      if (daysSince < 3) return false;
    }
    if (filters.excludeSpicy) {
      if (dish.tags.includes('川菜') || dish.tags.includes('火锅')) return false;
    }
    if (filters.excludeNoodles && dish.tags.includes('面条类')) return false;
    return true;
  });
}

function weightedRandom(dishes) {
  if (dishes.length === 0) return null;
  const totalWeight = dishes.reduce((sum, d) => sum + d.weight, 0);
  let rand = Math.random() * totalWeight;
  for (const dish of dishes) {
    rand -= dish.weight;
    if (rand <= 0) return dish;
  }
  return dishes[dishes.length - 1];
}

let state = {
  dishes: [],
  currentScene: '不限',
  filters: {
    excludeSpicy: false,
    excludeNoodles: false,
    excludeRecent: false,
    excludeBlacklisted: true,
  },
};

let isSpinning = false;
let currentResult = null;
let audioCtx = null;
let soundEnabled = true;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playTickSound() {
  if (!soundEnabled) return;
  const ctx = getAudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.frequency.value = 800;
  osc.type = 'sine';
  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
  osc.start(ctx.currentTime);
  osc.stop(ctx.currentTime + 0.05);
}

function playResultSound() {
  if (!soundEnabled) return;
  const ctx = getAudioContext();
  const notes = [523, 659, 784];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    const startTime = ctx.currentTime + i * 0.12;
    gain.gain.setValueAtTime(0.15, startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.4);
    osc.start(startTime);
    osc.stop(startTime + 0.4);
  });
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundEnabled ? '🔊 音效' : '🔇 音效关';
  const data = loadData() || state;
  data.soundEnabled = soundEnabled;
  localStorage.setItem('whatToEat', JSON.stringify(data));
}

function createBgDecoration() {
  const container = document.getElementById('bgDecoration');
  for (let i = 0; i < 18; i++) {
    const item = document.createElement('div');
    item.className = 'bg-decoration__item';
    item.textContent = BG_EMOJIS[Math.floor(Math.random() * BG_EMOJIS.length)];
    item.style.cssText = `
      left: ${Math.random() * 100}%;
      font-size: ${Math.random() * 20 + 20}px;
      animation-duration: ${Math.random() * 15 + 18}s;
      animation-delay: ${Math.random() * 15}s;
    `;
    container.appendChild(item);
  }
}

function showConfetti() {
  const colors = ['#ff6b6b', '#ffa502', '#7bed9f', '#70a1ff', '#5352ed', '#ff9ff3'];
  const container = document.createElement('div');
  container.className = 'confetti';
  document.body.appendChild(container);

  for (let i = 0; i < 50; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti__piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = Math.random() > 0.5 ? '50%' : '0';
    piece.style.cssText = `
      left: ${50 + (Math.random() - 0.5) * 40}%;
      top: 40%;
      background: ${color};
      border-radius: ${shape};
      width: ${Math.random() * 8 + 6}px;
      height: ${Math.random() * 8 + 6}px;
      animation: confetti-fall ${Math.random() * 2 + 1.5}s ease-out forwards;
      animation-delay: ${Math.random() * 0.5}s;
    `;
    container.appendChild(piece);
  }

  setTimeout(() => container.remove(), 3000);
}

function initState() {
  const saved = loadData();
  if (saved && saved.dishes && saved.dishes.length > 0) {
    state = saved;
    state.filters = { ...FILTERS.reduce((acc, f) => ({ ...acc, [f.key]: false }), {}), ...state.filters };
    if (saved.soundEnabled !== undefined) {
      soundEnabled = saved.soundEnabled;
    }
  } else {
    state.dishes = PRESET_DISHES.map(d => ({
      id: generateId(),
      name: d.name,
      tags: d.tags,
      scenes: d.scenes,
      weight: 5,
      lastEaten: null,
      isBlacklisted: false,
      isCustom: false,
    }));
    saveData(state);
  }
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 音效' : '🔇 音效关';
}

function renderSceneBar() {
  const container = document.getElementById('sceneBar');
  container.innerHTML = SCENES.map(scene => `
    <button class="scene-bar__btn${scene === state.currentScene ? ' scene-bar__btn--active' : ''}"
            data-scene="${scene}">${scene}</button>
  `).join('');

  container.addEventListener('click', e => {
    const btn = e.target.closest('[data-scene]');
    if (!btn) return;
    state.currentScene = btn.dataset.scene;
    saveData(state);
    renderSceneBar();
  });
}

function renderFilterBar() {
  const container = document.getElementById('filterBar');
  container.innerHTML = FILTERS.map(f => `
    <button class="filter-bar__chip${state.filters[f.key] ? ' filter-bar__chip--active' : ''}"
            data-filter="${f.key}">${f.label}</button>
  `).join('');

  container.addEventListener('click', e => {
    const chip = e.target.closest('[data-filter]');
    if (!chip) return;
    const key = chip.dataset.filter;
    state.filters[key] = !state.filters[key];
    saveData(state);
    renderFilterBar();
  });
}

function renderWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const dishes = filterDishes(state.dishes, state.currentScene, state.filters);

  ctx.clearRect(0, 0, WHEEL_SIZE, WHEEL_SIZE);

  if (dishes.length === 0) {
    ctx.beginPath();
    ctx.arc(WHEEL_CENTER, WHEEL_CENTER, WHEEL_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('暂无菜品', WHEEL_CENTER, WHEEL_CENTER);
    return;
  }

  const sliceAngle = (Math.PI * 2) / dishes.length;

  dishes.forEach((dish, i) => {
    const startAngle = i * sliceAngle - Math.PI / 2;
    const endAngle = startAngle + sliceAngle;

    ctx.beginPath();
    ctx.moveTo(WHEEL_CENTER, WHEEL_CENTER);
    ctx.arc(WHEEL_CENTER, WHEEL_CENTER, WHEEL_RADIUS, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(WHEEL_CENTER, WHEEL_CENTER);
    ctx.rotate(startAngle + sliceAngle / 2);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${dishes.length > 12 ? '11px' : '13px'} sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 4;
    const textRadius = WHEEL_RADIUS * 0.65;
    const displayName = dish.name.length > 5 ? dish.name.slice(0, 5) + '…' : dish.name;
    ctx.fillText(displayName, textRadius, 0);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(WHEEL_CENTER, WHEEL_CENTER, 32, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.arc(WHEEL_CENTER, WHEEL_CENTER, 8, 0, Math.PI * 2);
  ctx.fillStyle = 'var(--primary)';
  ctx.fill();
}

function spinWheel() {
  if (isSpinning) return;
  const dishes = filterDishes(state.dishes, state.currentScene, state.filters);
  if (dishes.length === 0) {
    showResult('暂无可选菜品，请添加或调整过滤条件', '❓');
    return;
  }

  isSpinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('wheelContainer').classList.add('wheel-container--spinning');
  hideResult();

  const selected = weightedRandom(dishes);
  const selectedIndex = dishes.indexOf(selected);
  const sliceAngle = 360 / dishes.length;
  const targetSliceCenter = selectedIndex * sliceAngle + sliceAngle / 2;
  const extraRotations = MIN_ROTATIONS * 360;
  const targetAngle = extraRotations + (360 - targetSliceCenter);

  const canvas = document.getElementById('wheelCanvas');
  const startTime = performance.now();
  let lastTickIndex = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / SPIN_DURATION, 1);
    const eased = 1 - Math.pow(1 - progress, 4);
    const currentAngle = eased * targetAngle;

    canvas.style.transform = `rotate(${currentAngle}deg)`;

    const tickIndex = Math.floor((currentAngle % 360) / sliceAngle);
    if (tickIndex !== lastTickIndex) {
      lastTickIndex = tickIndex;
      playTickSound();
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      canvas.style.transform = `rotate(${currentAngle % 360}deg)`;
      isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('wheelContainer').classList.remove('wheel-container--spinning');
      currentResult = selected;
      showResult(`今天吃 ${selected.name}！`);
      playResultSound();
      showConfetti();
    }
  }

  requestAnimationFrame(animate);
}

function showResult(text, emoji) {
  const resultCard = document.getElementById('resultCard');
  const resultEmoji = document.getElementById('resultEmoji');
  const resultText = document.getElementById('resultText');
  const resultActions = document.getElementById('resultActions');

  resultText.textContent = text;
  resultEmoji.textContent = emoji || FOOD_EMOJIS[Math.floor(Math.random() * FOOD_EMOJIS.length)];
  resultCard.classList.add('result__card--visible');
  resultActions.classList.add('result__actions--visible');
}

function hideResult() {
  const resultCard = document.getElementById('resultCard');
  const resultActions = document.getElementById('resultActions');
  resultCard.classList.remove('result__card--visible');
  resultActions.classList.remove('result__actions--visible');
  currentResult = null;
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('modal-overlay--visible');
  renderDishList();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('modal-overlay--visible');
}

function renderDishList() {
  const list = document.getElementById('dishList');
  if (state.dishes.length === 0) {
    list.innerHTML = `
      <li class="empty-state">
        <div class="empty-state__icon">🍽️</div>
        <div class="empty-state__text">还没有菜品，快去添加吧！</div>
      </li>`;
    return;
  }

  list.innerHTML = state.dishes.map(dish => `
    <li class="dish-list__item${dish.isBlacklisted ? ' dish-list__item--blacklisted' : ''}" data-id="${dish.id}">
      <div class="dish-list__info">
        <span class="dish-list__name">${dish.isBlacklisted ? '<s>' : ''}${dish.name}${dish.isBlacklisted ? '</s>' : ''}</span>
        <div class="dish-list__meta">
          <span class="dish-list__tags">
            ${dish.tags.map(t => `<span class="dish-list__tag">${t}</span>`).join('')}
          </span>
          <span class="dish-list__scenes">${dish.scenes.join(' · ')}</span>
          <span class="dish-list__weight">权重 ${dish.weight}</span>
        </div>
      </div>
      <div class="dish-list__actions">
        <button class="dish-list__blacklist${dish.isBlacklisted ? ' dish-list__blacklist--active' : ''}"
                data-blacklist="${dish.id}" title="${dish.isBlacklisted ? '取消踩雷' : '标记踩雷'}">💣</button>
        <button class="dish-list__delete" data-delete="${dish.id}" title="删除">×</button>
      </div>
    </li>
  `).join('');
}

function addDish() {
  const input = document.getElementById('dishInput');
  const name = input.value.trim();
  if (!name) return;
  if (state.dishes.some(d => d.name === name)) {
    input.value = '';
    input.placeholder = '菜品已存在！';
    setTimeout(() => { input.placeholder = '输入菜品名称，回车添加'; }, 1500);
    return;
  }

  state.dishes.push({
    id: generateId(),
    name,
    tags: ['自定义'],
    scenes: ['午餐', '晚餐'],
    weight: 5,
    lastEaten: null,
    isBlacklisted: false,
    isCustom: true,
  });

  saveData(state);
  input.value = '';
  renderDishList();
  renderWheel();
}

function deleteDish(id) {
  state.dishes = state.dishes.filter(d => d.id !== id);
  saveData(state);
  renderDishList();
  renderWheel();
}

function toggleBlacklist(id) {
  const dish = state.dishes.find(d => d.id === id);
  if (!dish) return;
  dish.isBlacklisted = !dish.isBlacklisted;
  dish.weight = dish.isBlacklisted ? 1 : 5;
  saveData(state);
  renderDishList();
  renderWheel();
}

function confirmChoice() {
  if (!currentResult) return;
  const dish = state.dishes.find(d => d.id === currentResult.id);
  if (dish) {
    dish.lastEaten = Date.now();
    dish.weight = Math.min(dish.weight + 1, 10);
    state.dishes.forEach(d => {
      if (d.id !== dish.id && d.tags.some(t => dish.tags.includes(t))) {
        d.weight = Math.max(d.weight - 1, 1);
      }
    });
    saveData(state);
  }
  hideResult();
  renderWheel();
}

function shareResult() {
  if (!currentResult) {
    showToast('还没有抽选结果哦');
    return;
  }
  const text = `我今天吃 ${currentResult.name}！你吃什么？来转一转吧 🎯`;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制到剪贴板，去分享吧！');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('已复制到剪贴板，去分享吧！');
  } catch (e) {
    showToast('复制失败，请手动复制');
  }
  document.body.removeChild(textarea);
}

function showToast(message) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('toast--visible'));
  setTimeout(() => {
    toast.classList.remove('toast--visible');
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}

function bindEvents() {
  document.getElementById('spinBtn').addEventListener('click', spinWheel);
  document.getElementById('respinBtn').addEventListener('click', spinWheel);
  document.getElementById('confirmBtn').addEventListener('click', confirmChoice);
  document.getElementById('manageBtn').addEventListener('click', openModal);
  document.getElementById('soundBtn').addEventListener('click', toggleSound);
  document.getElementById('shareBtn').addEventListener('click', shareResult);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });
  document.getElementById('addDishBtn').addEventListener('click', addDish);
  document.getElementById('dishInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addDish();
  });
  document.getElementById('dishList').addEventListener('click', e => {
    const deleteBtn = e.target.closest('[data-delete]');
    if (deleteBtn) return deleteDish(deleteBtn.dataset.delete);
    const blacklistBtn = e.target.closest('[data-blacklist]');
    if (blacklistBtn) return toggleBlacklist(blacklistBtn.dataset.blacklist);
  });
}

initState();
renderSceneBar();
renderFilterBar();
renderWheel();
bindEvents();
createBgDecoration();
</script>
</body>
</html>
